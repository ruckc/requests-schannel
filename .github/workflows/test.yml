name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra lint

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        run: uv run mypy src/requests_schannel --strict

  setup-certs:
    name: Setup test certificates
    runs-on: windows-latest
    outputs:
      root-thumbprint: ${{ steps.certs.outputs.root_thumbprint }}
      server-thumbprint: ${{ steps.certs.outputs.server_thumbprint }}
      client-thumbprint: ${{ steps.certs.outputs.client_thumbprint }}
    steps:
      - name: Generate certificates
        id: certs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $certDir = "$env:RUNNER_TEMP\certs"
          New-Item -ItemType Directory -Path $certDir -Force | Out-Null

          # Create Root CA
          $rootCA = New-SelfSignedCertificate `
            -Subject "CN=Test Root CA" `
            -KeyUsage CertSign, CRLSign `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(1) `
            -TextExtension @("2.5.29.19={text}cA=true")

          # Export Root CA as .cer
          Export-Certificate -Cert $rootCA -FilePath "$certDir\rootca.cer" | Out-Null

          # Create Server cert signed by Root CA
          $serverCert = New-SelfSignedCertificate `
            -Subject "CN=localhost" `
            -DnsName "localhost" `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(1) `
            -Signer $rootCA `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.1")

          # Create Client cert signed by Root CA
          $clientCert = New-SelfSignedCertificate `
            -Subject "CN=Test Client" `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(1) `
            -Signer $rootCA `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.2")

          # Export certs as PFX
          $pfxPass = ConvertTo-SecureString -String "test-password" -Force -AsPlainText
          Export-PfxCertificate -Cert $serverCert -FilePath "$certDir\server.pfx" -Password $pfxPass | Out-Null
          Export-PfxCertificate -Cert $clientCert -FilePath "$certDir\client.pfx" -Password $pfxPass | Out-Null

          # Output thumbprints
          echo "root_thumbprint=$($rootCA.Thumbprint)" >> $env:GITHUB_OUTPUT
          echo "server_thumbprint=$($serverCert.Thumbprint)" >> $env:GITHUB_OUTPUT
          echo "client_thumbprint=$($clientCert.Thumbprint)" >> $env:GITHUB_OUTPUT

      - name: Upload certificates
        uses: actions/upload-artifact@v7
        with:
          name: test-certificates
          path: ${{ runner.temp }}/certs/

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: setup-certs
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --all-extras

      - name: Download certificates
        uses: actions/download-artifact@v8
        with:
          name: test-certificates
          path: ${{ runner.temp }}/certs/

      - name: Import certificates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Import Root CA to machine-level trusted root (no GUI dialog with admin)
          certutil -addstore -f Root "$env:RUNNER_TEMP\certs\rootca.cer"

          # Import server and client PFX into CurrentUser\My
          $pfxPass = ConvertTo-SecureString -String "test-password" -Force -AsPlainText
          Import-PfxCertificate -FilePath "$env:RUNNER_TEMP\certs\server.pfx" `
            -CertStoreLocation "Cert:\CurrentUser\My" -Password $pfxPass
          Import-PfxCertificate -FilePath "$env:RUNNER_TEMP\certs\client.pfx" `
            -CertStoreLocation "Cert:\CurrentUser\My" -Password $pfxPass

          # Set thumbprints as env vars
          echo "ROOT_CA_THUMBPRINT=${{ needs.setup-certs.outputs.root-thumbprint }}" >> $env:GITHUB_ENV
          echo "SERVER_THUMBPRINT=${{ needs.setup-certs.outputs.server-thumbprint }}" >> $env:GITHUB_ENV
          echo "CLIENT_THUMBPRINT=${{ needs.setup-certs.outputs.client-thumbprint }}" >> $env:GITHUB_ENV

      - name: Run unit tests
        run: >
          uv run -p ${{ matrix.python-version }} pytest tests/unit/
          --cov=src/requests_schannel
          --cov-report=xml:coverage-unit.xml
          --cov-report=term-missing
          -v --timeout=60

      - name: Run integration tests
        run: >
          uv run python -m pytest tests/integration/ -m "not network"
          --cov=src/requests_schannel
          --cov-append
          --cov-report=xml:coverage-integration.xml
          --cov-report=term-missing
          -v --timeout=60

      - name: Run compatibility tests
        run: >
          uv run python -m pytest tests/compat/ -m "not network"
          --cov=src/requests_schannel
          --cov-append
          --cov-report=xml:coverage-compat.xml
          --cov-report=term-missing
          -v --timeout=60

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage-*.xml

      - name: Cleanup test certificates
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $thumbprints = @($env:ROOT_CA_THUMBPRINT, $env:SERVER_THUMBPRINT, $env:CLIENT_THUMBPRINT)
          Get-ChildItem "Cert:\CurrentUser\My" | Where-Object {
            $_.Thumbprint -in $thumbprints
          } | Remove-Item -Force
          # Root CA was imported to machine store (no GUI dialog)
          certutil -delstore Root $env:ROOT_CA_THUMBPRINT
