name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra lint

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        run: uv run mypy src/requests_schannel --strict

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --all-extras

      - name: Setup test certificates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Create Root CA
          $rootCA = New-SelfSignedCertificate `
            -Subject "CN=Test Root CA" `
            -KeyUsage CertSign, CRLSign `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(1) `
            -TextExtension @("2.5.29.19={text}cA=true")

          # Export Root CA to trusted store
          $rootCert = Export-Certificate -Cert $rootCA -FilePath "$env:RUNNER_TEMP\rootca.cer"
          Import-Certificate -FilePath "$env:RUNNER_TEMP\rootca.cer" -CertStoreLocation "Cert:\CurrentUser\Root"

          # Create Server cert
          $serverCert = New-SelfSignedCertificate `
            -Subject "CN=localhost" `
            -DnsName "localhost" `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(1) `
            -Signer $rootCA `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.1")

          # Create Client cert
          $clientCert = New-SelfSignedCertificate `
            -Subject "CN=Test Client" `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(1) `
            -Signer $rootCA `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.2")

          # Export server cert as PFX
          $pfxPass = ConvertTo-SecureString -String "test-password" -Force -AsPlainText
          Export-PfxCertificate -Cert $serverCert -FilePath "$env:RUNNER_TEMP\server.pfx" -Password $pfxPass

          # Export thumbprints
          echo "ROOT_CA_THUMBPRINT=$($rootCA.Thumbprint)" >> $env:GITHUB_ENV
          echo "SERVER_THUMBPRINT=$($serverCert.Thumbprint)" >> $env:GITHUB_ENV
          echo "CLIENT_THUMBPRINT=$($clientCert.Thumbprint)" >> $env:GITHUB_ENV

      - name: Run unit tests
        run: >
          uv run pytest tests/unit/
          --cov=src/requests_schannel
          --cov-report=xml:coverage-unit.xml
          --cov-report=term-missing
          -v --timeout=60

      - name: Run integration tests
        run: >
          uv run pytest tests/integration/ -m "not network"
          --cov=src/requests_schannel
          --cov-append
          --cov-report=xml:coverage-integration.xml
          --cov-report=term-missing
          -v --timeout=60

      - name: Run compatibility tests
        run: >
          uv run pytest tests/compat/ -m "not network"
          --cov=src/requests_schannel
          --cov-append
          --cov-report=xml:coverage-compat.xml
          --cov-report=term-missing
          -v --timeout=60

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage-*.xml

      - name: Cleanup test certificates
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'SilentlyContinue'
          $thumbprints = @($env:ROOT_CA_THUMBPRINT, $env:SERVER_THUMBPRINT, $env:CLIENT_THUMBPRINT)
          Get-ChildItem "Cert:\CurrentUser\My" | Where-Object {
            $_.Thumbprint -in $thumbprints
          } | Remove-Item -Force
          Get-ChildItem "Cert:\CurrentUser\Root" | Where-Object {
            $_.Thumbprint -eq $env:ROOT_CA_THUMBPRINT
          } | Remove-Item -Force
