name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  # -------------------------------------------------------------------------
  # Windows – full integration tests including SChannel / mTLS
  # -------------------------------------------------------------------------
  test-windows:
    name: Test (Windows / Python ${{ matrix.python-version }})
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: >
          uv run pytest
          --cov=requests_schannel
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80
          -v

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-windows
          path: coverage.xml

  # -------------------------------------------------------------------------
  # Lint / import check
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Verify package imports cleanly
        run: uv run python -c "import requests_schannel; print('OK')"

      - name: Check package metadata
        run: uv run python -m build --wheel --no-isolation 2>$null; if ($LASTEXITCODE -ne 0) { echo "build skipped (no build tool)" }
        shell: pwsh
